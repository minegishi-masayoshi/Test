<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Import Kobo Data</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script type="module" src="./app.js"></script>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f4f4;
padding:30px;
}

.container{
background:white;
padding:20px;
border-radius:6px;
max-width:700px;
margin:auto;
}

h2{
margin-bottom:20px;
}

button{
padding:10px 15px;
border:none;
background:#2e7d32;
color:white;
cursor:pointer;
margin-right:10px;
}

button.secondary{
background:#666;
}

.summary{
margin-top:20px;
padding:10px;
background:#fafafa;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="container">

<h2>Import Kobo Data</h2>

<p>Select survey and upload Kobo CSV export.</p>

<label>Survey</label><br>
<select id="surveySelect"></select>

<br><br>

<input type="file" id="fileUpload" accept=".csv">

<br><br>

<button id="validateBtn">Validate Data</button>
<button id="importBtn">Import to FIPS</button>

<div class="summary">

<h3>Summary</h3>

<p>Total Records: <span id="totalRecords">-</span></p>

<p>Mapped Fields: <span id="mappedFields">-</span></p>

</div>

<br>

<button class="secondary" onclick="window.location.href='./new-survey.html'">
Back
</button>

</div>

</body>
</html>
