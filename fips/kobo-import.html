<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Import Kobo Data</title>

<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="strict-origin-when-cross-origin">

<meta http-equiv="Cache-Control" content="no-store">
<meta http-equiv="Pragma" content="no-cache">

<meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
script-src 'self' https://cdn.jsdelivr.net;
style-src 'self' 'unsafe-inline';
connect-src https://pncvddqeuxlkplwgvxgk.supabase.co;
img-src 'self' data:;
font-src 'self';
object-src 'none';
base-uri 'self';
frame-ancestors 'none';
form-action 'self';
">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script type="module" src="./app.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
padding:30px;
}

.container{
background:white;
padding:25px;
border-radius:6px;
max-width:720px;
margin:auto;
}

h2{
margin-bottom:10px;
}

.subtitle{
color:#555;
margin-bottom:20px;
}

button{
padding:10px 16px;
border:none;
background:#2e7d32;
color:white;
cursor:pointer;
margin-right:10px;
}

button.secondary{
background:#666;
}

button.upload{
background:#1976d2;
}

.summary{
margin-top:20px;
padding:12px;
background:#fafafa;
border:1px solid #ddd;
}

.file-name{
margin-left:10px;
color:#555;
}

</style>

</head>

<body>

<div class="container">

<h2>Import Kobo Data</h2>

<p class="subtitle">
Upload Kobo CSV export file.
</p>

<button class="upload"
onclick="document.getElementById('fileUpload').click()">
Choose CSV File
</button>

<span id="fileName" class="file-name">
No file selected
</span>

<input
type="file"
id="fileUpload"
accept=".csv,text/csv"
hidden>

<br><br>

<button id="validateBtn">
Validate Data
</button>

<div class="summary">

<h3>Summary</h3>

<p>
Total Records: <span id="totalRecords">-</span>
</p>

<p>
Mapped Fields: <span id="mappedFields">-</span>
</p>

</div>

<br>

<button class="secondary"
onclick="window.location.href='./new-survey.html'">
Back
</button>

</div>

<script>

const fileInput = document.getElementById("fileUpload");
const fileName = document.getElementById("fileName");

fileInput.addEventListener("change", () => {

if(fileInput.files.length === 0){
return;
}

const file = fileInput.files[0];

const MAX_SIZE = 5 * 1024 * 1024;

if(file.size > MAX_SIZE){

alert("File too large (max 5MB)");
fileInput.value="";
fileName.textContent="No file selected";
return;

}

if(!file.name.toLowerCase().endsWith(".csv")){

alert("Invalid file type. Please upload CSV.");
fileInput.value="";
fileName.textContent="No file selected";
return;

}

fileName.textContent = file.name;

});

</script>

</body>
</html>
