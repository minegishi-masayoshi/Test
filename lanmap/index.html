<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LANMAP – Forest Map Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .measure-popup {
      font-size: 13px;
      line-height: 1.4;
    }

    .custom-search-control {
      background: #fff;
      padding: 8px;
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
      display: block;
      margin-bottom: 8px;
    }

    .search-box-wrapper {
      position: relative;
      width: 290px;
    }

    .search-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .custom-search-control input {
      width: 180px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
    }

    .custom-search-control button,
    .print-map-button {
      padding: 4px 8px;
      border: 1px solid #999;
      background: #f7f7f7;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    .custom-search-control button:hover,
    .print-map-button:hover {
      background: #ececec;
    }

    .search-suggestion-list {
      position: absolute;
      top: 38px;
      left: 0;
      width: 230px;
      max-height: 240px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 2000;
    }

    .search-suggestion-item {
      padding: 6px 8px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      line-height: 1.3;
    }

    .search-suggestion-item:last-child {
      border-bottom: none;
    }

    .search-suggestion-item:hover,
    .search-suggestion-item.active {
      background: #f2f2f2;
    }

    .search-suggestion-name {
      font-weight: bold;
    }

    .search-suggestion-meta {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .map-title-control {
      background: rgba(255, 255, 255, 0.92);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
      margin-bottom: 8px;
      white-space: nowrap;
    }

    .print-control {
      background: #fff;
      padding: 6px;
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.4);
      margin-bottom: 8px;
    }

    .leaflet-top.leaflet-right .leaflet-control {
      clear: both;
    }

    @media print {
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #map {
        width: 100vw !important;
        height: 100vh !important;
      }

      .leaflet-control-zoom,
      .leaflet-draw,
      .leaflet-control-layers,
      .custom-search-control,
      .print-control {
        display: none !important;
      }

      .map-title-control {
        display: block !important;
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 9999;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="map.js"></script>
</body>
</html>
