<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validation</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-title">FIPS</div>
      <div class="brand-subtitle">Validation</div>
    </div>
  </header>

  <main class="main-content">
    <section class="welcome-panel">
      <h1>Validation Result</h1>
      <p>Check errors and warnings before importing data into FIPS.</p>
    </section>

    <section class="menu-panel">
      <h2>Summary</h2>
      <table class="survey-table">
        <thead>
          <tr>
            <th>Total Records</th>
            <th>Valid</th>
            <th>Warnings</th>
            <th>Errors</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>120</td>
            <td>110</td>
            <td>6</td>
            <td>4</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="menu-panel">
      <h2>Error List</h2>
      <table class="survey-table">
        <thead>
          <tr>
            <th>Row</th>
            <th>Plot</th>
            <th>Tree</th>
            <th>Field</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>12</td>
            <td>3</td>
            <td>2</td>
            <td>Species Code</td>
            <td>Unknown species code</td>
          </tr>
          <tr>
            <td>35</td>
            <td>4</td>
            <td>1</td>
            <td>DBH</td>
            <td>Missing value</td>
          </tr>
          <tr>
            <td>78</td>
            <td>7</td>
            <td>4</td>
            <td>Height</td>
            <td>Invalid number</td>
          </tr>
        </tbody>
      </table>

      <div style="margin-top: 16px;">
        <a href="./kobo-import.html" style="text-decoration:none;">
          <button type="button">Back to Import</button>
        </a>
        <a href="./status.html" style="text-decoration:none;">
          <button type="button">Continue</button>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
