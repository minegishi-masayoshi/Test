<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Kobo Data</title>

  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self' https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline';
      connect-src https://pncvddqeuxlkplwgvxgk.supabase.co;
      img-src 'self' data:;
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
      form-action 'self';
    ">

  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">FIPS</div>
        <div class="brand-subtitle">Import Kobo Data</div>
      </div>
      <div class="user-box">
        <span id="userStatus">Access granted</span>
      </div>
    </header>

    <main class="main-content">
      <section class="welcome-panel">
        <h1>Import Kobo Data</h1>
        <p>Upload a Kobo CSV export file for validation and import.</p>
      </section>

      <section class="menu-panel">
        <button id="chooseFileBtn" class="upload" type="button">
          Choose CSV File
        </button>

        <span id="fileName" class="file-name">No file selected</span>

        <input
          type="file"
          id="fileUpload"
          accept=".csv,text/csv"
          hidden
        >

        <br><br>

        <button id="validateBtn" type="button">
          Validate Data
        </button>

        <div class="summary">
          <h3>Summary</h3>

          <p>
            Total Records: <span id="totalRecords">-</span>
          </p>

          <p>
            Mapped Fields: <span id="mappedFields">-</span>
          </p>
        </div>

        <br>

        <button id="backToSurveyBtn" class="secondary" type="button">
          Back
        </button>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
