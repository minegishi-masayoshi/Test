<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-title">FIPS</div>
      <div class="brand-subtitle">Processing</div>
    </div>
  </header>

  <main class="main-content">
    <section class="welcome-panel">
      <h1>Processing Status</h1>
      <p>Run processing and review survey results.</p>
    </section>

    <section class="menu-panel">
      <h2>Survey Information</h2>
      <table class="survey-table">
        <thead>
          <tr>
            <th>Survey No.</th>
            <th>Survey Name</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>12001</td>
            <td>Sample Survey A</td>
            <td>Validated</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="menu-panel">
      <h2>Processing</h2>
      <table class="survey-table">
        <thead>
          <tr>
            <th>Step</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Data Import</td>
            <td>Completed</td>
          </tr>
          <tr>
            <td>Validation</td>
            <td>Completed</td>
          </tr>
          <tr>
            <td>Processing</td>
            <td>Not Started</td>
          </tr>
          <tr>
            <td>Result</td>
            <td>Not Generated</td>
          </tr>
        </tbody>
      </table>

      <div style="margin-top: 16px;">
        <button type="button">Run Processing</button>
        <button type="button">View Result</button>
        <a href="./index.html" style="text-decoration:none;">
          <button type="button">Back</button>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
