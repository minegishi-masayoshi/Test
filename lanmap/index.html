<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Restricted Module</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta
    http-equiv="Content-Security-Policy"
    content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline' https://unpkg.com;
      connect-src 'self' https://pncvddqeuxlkplwgvxgk.supabase.co https://*.tile.openstreetmap.org;
      img-src 'self' data: blob: https://pncvddqeuxlkplwgvxgk.supabase.co https://*.tile.openstreetmap.org https://unpkg.com;
      font-src 'self' data:;
      object-src 'none';
      base-uri 'self';
      frame-ancestors 'none';
      form-action 'self';
    "
  />

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .print-control button,
    .custom-search-control button {
      border: none;
      background: #1f4b99;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .custom-search-control,
    .map-title-control {
      background: #fff;
      border-radius: 4px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.3);
      padding: 6px;
    }

    .search-box-wrapper {
      width: 260px;
    }

    .search-row {
      display: flex;
      gap: 6px;
    }

    .search-row input {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 13px;
    }

    .search-suggestion-list {
      margin-top: 6px;
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      background: #fff;
    }

    .search-suggestion-item {
      padding: 8px 10px;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
    }

    .search-suggestion-item:last-child {
      border-bottom: none;
    }

    .search-suggestion-item.active,
    .search-suggestion-item:hover {
      background: #eef4ff;
    }

    .search-suggestion-name {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
    }

    .search-suggestion-meta {
      margin-top: 2px;
      font-size: 11px;
      color: #6b7280;
    }

    .map-title-control {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
    }

    .measure-popup {
      font-size: 13px;
      line-height: 1.5;
    }

    @media print {
      .leaflet-control-container {
        display: none !important;
      }

      #map {
        width: 100vw;
        height: 100vh;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="map.js"></script>
</body>
</html>
