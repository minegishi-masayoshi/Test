<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LANMAP</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      display: none;
    }

    .topbar {
      height: 56px;
      background: #1f4b99;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-sizing: border-box;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar a,
    .topbar button {
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.12);
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .topbar a:hover,
    .topbar button:hover {
      background: rgba(255,255,255,0.2);
    }

    #map {
      width: 100%;
      height: calc(100vh - 56px);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <strong>LANMAP</strong>
      <span id="userInfo"></span>
    </div>

    <div class="topbar-right">
      <a href="index.html">Back to Home</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'

    /* Supabase connection settings */
    const supabaseUrl = 'PUT YOUR PROJECT URL HERE'
    const supabaseKey = 'PUT YOUR PUBLISHABLE KEY HERE'

    const supabase = createClient(supabaseUrl, supabaseKey)

    /* Check user session before showing the page */
    const { data: { session } } = await supabase.auth.getSession()

    if (!session) {
      window.location.href = 'index.html'
      throw new Error('Not authenticated')
    } else {
      document.body.style.display = 'block'
      document.getElementById('userInfo').textContent = session.user?.email ?? ''
    }

    /* Logout handler */
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut()
      window.location.href = 'index.html'
    })

    /* Initialize map */
    const map = L.map('map').setView([-6.5, 145.5], 7)

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map)

    /* Load sample polygon data from Supabase */
    const { data, error } = await supabase
      .from('province_sample')
      .select('id, name, category, geom')

    if (error) {
      alert('Data loading error: ' + error.message)
      console.error(error)
    } else {
      const features = data.map(row => ({
        type: 'Feature',
        geometry: row.geom,
        properties: {
          id: row.id,
          name: row.name,
          category: row.category
        }
      }))

      const layer = L.geoJSON(features, {
        onEachFeature: (feature, layer) => {
          const p = feature.properties
          layer.bindPopup(`<b>${p.name ?? ''}</b><br>Category: ${p.category ?? ''}`)
        }
      }).addTo(map)

      if (features.length > 0) {
        map.fitBounds(layer.getBounds())
      }
    }
  </script>

</body>
</html>
