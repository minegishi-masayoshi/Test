<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Import Kobo Data</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script type="module" src="./app.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f4f4;
padding:30px;
}

.container{
background:white;
padding:25px;
border-radius:6px;
max-width:720px;
margin:auto;
}

h2{
margin-bottom:10px;
}

.subtitle{
color:#555;
margin-bottom:20px;
}

button{
padding:10px 16px;
border:none;
background:#2e7d32;
color:white;
cursor:pointer;
margin-right:10px;
}

button.secondary{
background:#666;
}

button.upload{
background:#1976d2;
}

.summary{
margin-top:20px;
padding:12px;
background:#fafafa;
border:1px solid #ddd;
}

.file-name{
margin-left:10px;
color:#555;
}

</style>
</head>

<body>

<div class="container">

<h2>Import Kobo Data</h2>

<p class="subtitle">
Select survey and upload Kobo CSV export.
</p>

<button class="upload" onclick="document.getElementById('fileUpload').click()">
Choose CSV File
</button>

<span id="fileName" class="file-name">
No file selected
</span>

<input type="file" id="fileUpload" accept=".csv" hidden>

<br><br>

<button id="validateBtn">
Validate Data
</button>

<div class="summary">

<h3>Summary</h3>

<p>
Total Records: <span id="totalRecords">-</span>
</p>

<p>
Mapped Fields: <span id="mappedFields">-</span>
</p>

</div>

<br>

<button class="secondary"
onclick="window.location.href='./new-survey.html'">
Back
</button>

</div>

<script>

const fileInput = document.getElementById("fileUpload");
const fileName = document.getElementById("fileName");

fileInput.addEventListener("change", () => {

if(fileInput.files.length > 0){

fileName.textContent = fileInput.files[0].name;

}

});

</script>

</body>
</html>
