<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create New Survey</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="topbar">
<div class="brand">
<div class="brand-title">FIPS</div>
<div class="brand-subtitle">Create New Survey</div>
</div>
</header>

<main class="main-content">

<section class="welcome-panel">
<h1>Create New Survey</h1>
<p>Register a new survey and basic survey information.</p>
</section>

<section class="menu-panel">

<form>

<div class="form-row">
<label>Survey Number</label>
<input type="text">
</div>

<div class="form-row">
<label>Survey Name</label>
<input type="text">
</div>

<div class="form-row">
<label>Survey Date</label>
<input type="date">
</div>

<div class="form-row">
<label>Province</label>
<input type="text">
</div>

<div class="form-row">
<label>Number of Blocks</label>
<input type="number">
</div>

<div class="form-row">
<label>Gross Area (ha)</label>
<input type="number">
</div>

<div class="form-row">
<label>Plan ID</label>
<input type="text">
</div>

<div class="form-row">
<label>Survey Type</label>

<select>
<option>Virgin</option>
<option>LOI</option>
<option>Unlogged</option>
</select>

</div>

<div class="form-row">
<label>Vegetation</label>
<input type="text">
</div>

<div class="form-row">
<label>Slope Min (%)</label>
<input type="number">
</div>

<div class="form-row">
<label>Slope Max (%)</label>
<input type="number">
</div>

<div class="form-row">
<label>Elevation Min (m)</label>
<input type="number">
</div>

<div class="form-row">
<label>Elevation Max (m)</label>
<input type="number">
</div>

<div class="form-row">
<label>Adjusted Net Forest Area</label>
<input type="number">
</div>

<br>

<button type="submit">Save Survey</button>

<a href="./index.html">
<button type="button">Back</button>
</a>

</form>

</section>

</main>

</body>
</html>
